<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GINOPS TCG – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: #1a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fundo estilo matriz/pixel */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(204,0,0,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(0,0,80,0.2) 0%, transparent 60%);
        }

        /* POKÉDEX CONTAINER */
        .pokedex {
            position: relative; z-index: 1;
            width: 360px;
            max-width: 95vw;
        }

        /* PARTE SUPERIOR DA POKÉDEX */
        .pdx-top {
            background: #CC0000;
            border-radius: 16px 16px 0 0;
            padding: 18px 20px 24px;
            position: relative;
            border: 3px solid #880000;
            border-bottom: none;
        }

        /* Câmera azul no canto */
        .pdx-camera {
            position: absolute;
            top: 14px; left: 16px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #6af, #0044aa);
            border: 3px solid #003388;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
        }
        .pdx-camera::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
        }

        /* Luzes pequenas */
        .pdx-lights {
            position: absolute;
            top: 18px; left: 54px;
            display: flex; gap: 5px;
        }
        .pdx-light {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.3);
        }
        .pdx-light.red    { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
        .pdx-light.yellow { background: #ffdd00; }
        .pdx-light.green  { background: #44ff44; box-shadow: 0 0 6px #44ff44; animation: blink 1.5s ease-in-out infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* TELA PRINCIPAL */
        .pdx-screen-wrap {
            margin-top: 40px;
            background: #111;
            border-radius: 10px;
            padding: 6px;
            border: 3px solid #660000;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }
        .pdx-screen {
            background: #0d1f0d;
            border-radius: 6px;
            padding: 16px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Scanlines */
        .pdx-screen::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none; z-index: 1;
        }

        .pdx-logo {
            height: 52px; object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(255,200,0,0.5));
            position: relative; z-index: 2;
        }
        .pdx-screen-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #00ff44;
            text-shadow: 0 0 8px #00ff44;
            text-align: center;
            line-height: 1.8;
            position: relative; z-index: 2;
            animation: typing 0.5s steps(1) infinite;
        }
        @keyframes typing {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.7; }
        }

        /* DOBRADIÇA */
        .pdx-hinge {
            background: #880000;
            height: 14px;
            border-left: 3px solid #660000;
            border-right: 3px solid #660000;
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .pdx-hinge-bolt {
            width: 20px; height: 8px;
            background: #555;
            border-radius: 4px;
            border: 1px solid #333;
        }

        /* PARTE INFERIOR */
        .pdx-bottom {
            background: #CC0000;
            border-radius: 0 0 20px 20px;
            padding: 16px 20px 22px;
            border: 3px solid #880000;
            border-top: none;
        }

        /* Mini tela do formulário */
        .pdx-form-screen {
            background: #c8e8c0;
            border-radius: 6px;
            padding: 14px 16px;
            border: 3px solid #445544;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
            margin-bottom: 14px;
        }

        .pdx-form-screen label {
            display: block;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #224422;
            margin-bottom: 5px;
        }

        .pdx-form-screen input {
            width: 100%;
            padding: 8px 10px;
            background: #a8c8a0;
            border: 2px solid #446644;
            border-radius: 4px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #112211;
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .pdx-form-screen input:focus { border-color: #CC0000; background: #b8d8b0; }
        .pdx-form-screen input::placeholder { color: #668866; font-size: 13px; font-family: 'Nunito', sans-serif; }

        .error-msg {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #CC0000;
            text-align: center;
            margin-bottom: 8px;
            display: none;
            background: rgba(204,0,0,0.1);
            padding: 6px;
            border-radius: 4px;
        }

        /* Botões estilo D-pad */
        .pdx-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .pdx-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            border-radius: 6px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pdx-btn:active { transform: scale(0.95); }

        .pdx-btn-a {
            background: #ffdd00;
            color: #1a0a0a;
            border-bottom: 3px solid #bb9900;
            box-shadow: 0 3px 0 #997700;
        }
        .pdx-btn-a:hover { background: #ffe844; }

        .pdx-btn-b {
            background: #3333cc;
            color: white;
            border-bottom: 3px solid #111188;
            box-shadow: 0 3px 0 #0000aa;
        }
        .pdx-btn-b:hover { background: #4444dd; }

        /* Botão principal ENTER */
        .pdx-enter {
            width: 100%;
            padding: 12px;
            background: #CC0000;
            color: white;
            border: none;
            border-bottom: 4px solid #880000;
            border-radius: 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #660000;
        }
        .pdx-enter:hover  { background: #dd0000; transform: translateY(-1px); }
        .pdx-enter:active { transform: translateY(2px); box-shadow: 0 2px 0 #660000; }

        /* D-pad decorativo */
        .pdx-dpad {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 54px; height: 54px;
        }
        .dpad-h, .dpad-v {
            position: absolute;
            background: #880000;
            border-radius: 3px;
            border: 1px solid #660000;
        }
        .dpad-h { width: 54px; height: 18px; top: 18px; left: 0; }
        .dpad-v { width: 18px; height: 54px; top: 0; left: 18px; }
        .dpad-center {
            position: absolute;
            width: 18px; height: 18px;
            top: 18px; left: 18px;
            background: #770000;
            border-radius: 2px;
        }

        /* Botão admin pequeno no canto */
        .pdx-admin {
            text-align: center;
            margin-top: 10px;
        }
        .pdx-admin a {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: color 0.2s;
        }
        .pdx-admin a:hover { color: rgba(255,255,255,0.8); }

        /* Decoração lateral esquerda */
        .pdx-side-deco {
            position: absolute;
            left: 8px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 4px;
        }
        .pdx-side-btn {
            width: 8px; height: 24px;
            background: #aa0000;
            border-radius: 3px;
            border: 1px solid #770000;
        }
    </style>
</head>
